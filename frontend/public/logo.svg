<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D0E12"/>
      <stop offset="1" stop-color="#13141f"/>
    </linearGradient>
    <linearGradient id="gr" x1="100" y1="420" x2="420" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14f070"/>
      <stop offset="1" stop-color="#9945FF"/>
    </linearGradient>
    <linearGradient id="grText" x1="90" y1="0" x2="422" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14f070"/>
      <stop offset="1" stop-color="#9945FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Outer hexagon fill (matches header: opacity 0.15) -->
  <polygon
    points="256,54 394,132 394,288 256,366 118,288 118,132"
    fill="url(#gr)" opacity="0.15"/>

  <!-- Outer hexagon stroke (matches header stroke) -->
  <polygon
    points="256,54 394,132 394,288 256,366 118,288 118,132"
    fill="none" stroke="url(#gr)" stroke-width="5" filter="url(#glow)"/>

  <!-- Inner hexagon (matches header: opacity 0.6) -->
  <polygon
    points="256,130 322,169 322,247 256,286 190,247 190,169"
    fill="none" stroke="url(#gr)" stroke-width="3" opacity="0.6"/>

  <!-- Center dot (matches header circle r=3 scaled up) -->
  <circle cx="256" cy="210" r="22" fill="url(#gr)" filter="url(#dotGlow)"/>

  <!-- CredChain wordmark -->
  <text
    x="256" y="440"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="900"
    fill="url(#grText)"
    text-anchor="middle"
    letter-spacing="-2">CredChain</text>
</svg>
