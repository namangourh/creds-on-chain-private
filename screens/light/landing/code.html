    tailwind.config = {

      theme: {
        extend: {

          fontFamily: {
            "display": ["Inter", "sans-serif"],
            "body": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "md": "0.5rem",
            "lg": "1.5rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
          boxShadow: {
            'glass': '0 20px 40px -10px rgba(10, 25, 47, 0.05)',
            'btn-hover': '0 10px 25px -5px rgba(10, 25, 47, 0.2)'

<style>
    /* Base Styles */
    body {
      font-family: 'Inter', sans-serif;
      background-color: theme('colors.background-light');
      color: theme('colors.text-main');
    }

    /* Mesh Gradient Background */
    .bg-mesh {
      background-color: #FAFAFC;
      background-image: 
        radial-gradient(at 0% 0%, hsla(215, 65%, 90%, 0.4) 0px, transparent 50%),
        radial-gradient(at 100% 0%, hsla(210, 80%, 95%, 0.6) 0px, transparent 50%),
        radial-gradient(at 100% 100%, hsla(215, 65%, 90%, 0.4) 0px, transparent 50%),
        radial-gradient(at 0% 100%, hsla(210, 80%, 95%, 0.6) 0px, transparent 50%);
      background-attachment: fixed;
    }

    /* Glassmorphism Utilities */
    .glass-panel {
      background-color: theme('colors.surface-glass');
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: theme('boxShadow.glass');
    }

    /* Interactions */
    .btn-scale {
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .btn-scale:hover {
      transform: scale(1.02);
      box-shadow: theme('boxShadow.btn-hover');
    }

    /* Loading Spinner Animation */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin-custom {
      animation: spin 1s linear infinite;
    }
    
    /* Toast Animation */
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast-enter {
      animation: slideInRight 0.3s ease-out forwards;
    }
  </style>
</head>
